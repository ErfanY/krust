name: Release

on:
  push:
    tags:
      - 'v*'
      - '*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to publish (for example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          TARGET='${{ matrix.target }}'
          PKG="krust-${TARGET}"
          mkdir -p "dist/${PKG}"
          cp "target/${TARGET}/release/krust" "dist/${PKG}/krust"
          cp README.md LICENSE "dist/${PKG}/"
          tar -C dist -czf "dist/${PKG}.tar.gz" "${PKG}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.target }}
          path: dist/krust-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          path: dist
          merge-multiple: true

      - name: Resolve release tag/version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag }}"
          if [[ -z "${TAG}" ]]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          shasum -a 256 *.tar.gz > SHA256SUMS

      - name: Generate Homebrew formula
        shell: bash
        run: |
          set -euo pipefail
          scripts/release/generate_homebrew_formula.sh \
            --version "${{ steps.meta.outputs.version }}" \
            --checksums dist/SHA256SUMS \
            --output dist/krust.rb

      - name: Create or update release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" dist/*.tar.gz dist/SHA256SUMS dist/krust.rb --clobber
          else
            gh release create "${TAG}" dist/*.tar.gz dist/SHA256SUMS dist/krust.rb --generate-notes --title "${TAG}"
          fi
